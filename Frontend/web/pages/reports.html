<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deceptron - Case Reports</title>
    <link rel="icon" href="../assets/images/Eye icon.png">
    <link rel="stylesheet" href="../styles/output.css">
    <script src="../scripts/chart.min.js"></script>
    <link rel="stylesheet" href="../vendor/font-awesome/css/all.min.css">
    <link rel="stylesheet" href="../styles/sidebar.css">
    <style>
    :root {
        --primary-blue: #2563eb;
        --accent-cyan: #0ea5e9;
        --accent-rose: #ef4444;
        --sidebar-width: 260px;
        --bg-main: #0f172a;
        --text-main: #ffffff;
        --text-dim: #94a3b8;
        --sidebar-bg: #0f172a;
        --card-bg: #1e293b;
        --border-subtle: #334155;
    }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            overflow: hidden;
            width: 100vw;
            background-image: 
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.05) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(14, 165, 233, 0.05) 0, transparent 50%);
            background-attachment: fixed;
        }

        .heading-font { font-family: 'Orbitron', sans-serif; }

        button, a, select, .cursor-pointer { cursor: pointer !important; }

        .main-content {
            margin-left: var(--sidebar-width);
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .glass {
            background: var(--card-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        .glass:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 40px rgba(0, 219, 255, 0.15);
        }

        .report-card {
            background: var(--card-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 1.25rem;
            transition: all 0.2s ease;
        }
        .report-card:hover {
            border-color: var(--primary-blue);
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .status-badge {
            padding: 0.3rem 0.9rem;
            border-radius: 2rem;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .status-deceptive { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .status-credible { background: rgba(16, 185, 129, 0.1); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }
        .status-uncertain { background: rgba(245, 158, 11, 0.1); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.2); }

        .section-tab {
            padding: 0.5rem 1.5rem;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 0.75rem;
            color: #64748b;
            transition: all 0.25s ease;
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
        }
        .section-tab:hover { color: #22d3ee; background: rgba(34, 211, 238, 0.08); }
        .section-tab.active { color: #fff; background: rgba(34, 211, 238, 0.12); border-color: rgba(34, 211, 238, 0.2); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(0, 118, 214, 0.1); border-radius: 10px; }

    .search-bar {
        background: var(--bg-main);
        border: 1px solid var(--border-subtle);
        border-radius: 0.75rem;
        color: #ffffff;
        width: 100%;
        max-width: 360px;
        font-size: 0.8rem;
        transition: all 0.2s;
    }
    .search-bar:focus {
        outline: none;
        border-color: var(--accent-cyan);
        box-shadow: 0 0 20px rgba(0, 219, 255, 0.15);
    }

    .btn-primary {
        background: rgba(37, 99, 235, 0.1);
        border: 1px solid rgba(37, 99, 235, 0.3);
        color: var(--accent-cyan);
        border-radius: 0.75rem;
        transition: all 0.3s ease;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
    }
    .btn-primary:hover {
        background: var(--primary-blue);
        color: #ffffff;
        border-color: var(--primary-blue);
        box-shadow: 0 0 20px rgba(37, 99, 235, 0.4);
        transform: translateY(-2px);
    }
    .btn-outline {
        border: 1px solid var(--border-subtle);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-main);
        border-radius: 0.75rem;
        transition: all 0.3s ease;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
    }
    .btn-outline:hover {
        border-color: var(--primary-blue);
        background: var(--primary-blue);
        color: #ffffff;
        box-shadow: 0 0 20px rgba(37, 99, 235, 0.4);
        transform: translateY(-2px);
    }
    </style>
</head>
<body>
    <script src="../js/components/sidebar.js"></script>
    <main class="main-content">
        <header class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold heading-font text-white tracking-tight">Case Reports</h1>
                <div class="flex items-center mt-2 text-[10px] text-dim font-bold tracking-[0.2em] uppercase">
                    <span class="status-dot" style="width:8px;height:8px;background:#10b981;border-radius:50%;display:inline-block;margin-right:0.5rem;animation:pulse-glow 2s infinite;"></span>
                    Case Database: Active
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="text" id="searchInput" placeholder="Search reports..." class="search-bar pl-9 pr-3 py-2.5" oninput="filterReports()">
                </div>
            </div>
        </header>

        <div class="flex items-center gap-2 bg-black/20 rounded-xl p-1.5 border border-white/5 w-fit">
            <button class="section-tab active" data-section="all" onclick="switchSection('all')">
                <i class="fas fa-th-large mr-1.5"></i> All Reports
            </button>
            <button class="section-tab" data-section="voice" onclick="switchSection('voice')">
                <i class="fas fa-microphone-alt mr-1.5"></i> Voice Analysis
            </button>
            <button class="section-tab" data-section="facial" onclick="switchSection('facial')">
                <i class="fas fa-face-smile mr-1.5"></i> Facial Analysis
            </button>
            <button class="section-tab" data-section="pipeline" onclick="switchSection('pipeline')">
                <i class="fas fa-video mr-1.5"></i> Video Sessions
            </button>
        </div>

    <section id="reportsContainer" class="grid gap-4 max-h-[65vh] overflow-y-auto pr-1 custom-scrollbar">
    </section>
    </main>

    <style>
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px #10b981; }
            50% { box-shadow: 0 0 20px #10b981; }
            100% { box-shadow: 0 0 5px #10b981; }
        }
    </style>

    <script>
        let allReports = [];
        let currentSection = 'all';

        async function loadReports() {
            try {
                const response = await eel.get_reports()();
                if (response.success) {
                    allReports = response.data;
                    renderReports();
                }
            } catch (error) {
                console.error("Error fetching reports:", error);
            }
        }

        function switchSection(section) {
            currentSection = section;
            document.querySelectorAll('.section-tab').forEach(b => b.classList.remove('active'));
            document.querySelector(`.section-tab[data-section="${section}"]`).classList.add('active');
            renderReports();
        }

        function filterReports() {
            renderReports();
        }

        function renderReports() {
            const container = document.getElementById('reportsContainer');
            const searchTerm = (document.getElementById('searchInput').value || '').toLowerCase();

            let filtered = allReports;
            if (currentSection !== 'all') {
                filtered = filtered.filter(r => r.type === currentSection);
            }
            if (searchTerm) {
                filtered = filtered.filter(r =>
                    (r.source_file || '').toLowerCase().includes(searchTerm) ||
                    (r.id || '').toLowerCase().includes(searchTerm) ||
                    (r.type || '').toLowerCase().includes(searchTerm)
                );
            }

            if (filtered.length === 0) {
                const hasReports = allReports.length > 0;
                container.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center py-16 glass border border-dashed border-slate-700/50 bg-slate-900/30 rounded-2xl">
                        <div class="w-20 h-20 rounded-2xl bg-slate-800/50 flex items-center justify-center mb-6 border border-slate-700/30">
                            <i class="fas ${hasReports ? 'fa-search' : 'fa-folder-open'} text-3xl text-slate-600"></i>
                        </div>
                        <p class="text-sm font-bold heading-font text-slate-400 uppercase tracking-[0.15em]">${hasReports ? 'No Matching Reports' : 'No Reports Found'}</p>
                        <p class="text-[10px] text-slate-600 mt-2 uppercase tracking-widest font-bold">${hasReports ? 'Try adjusting your search or filter' : 'Record and analyse a session to generate reports'}</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(report => {
                const date = report.analysis_date || report.timestamp || '';
                const formattedDate = date ? new Date(date).toLocaleDateString('en-US', {
                    month: 'short', day: '2-digit', year: 'numeric'
                }) : 'N/A';
                const formattedTime = date ? new Date(date).toLocaleTimeString('en-US', {
                    hour: '2-digit', minute: '2-digit'
                }) : '';

                const typeConfig = getTypeConfig(report);
                const filename = (report.source_file || '').split('/').pop() || 'Unknown';

                return `
                <div class="report-card p-6 flex flex-wrap lg:flex-nowrap items-center gap-6 group">
                    <div class="flex items-center space-x-4 lg:w-1/4">
                        <div class="w-12 h-12 rounded-xl ${typeConfig.bg} flex items-center justify-center text-lg ${typeConfig.iconColor} border ${typeConfig.border} transition-all duration-300 group-hover:shadow-lg">
                            <i class="fas ${typeConfig.icon}"></i>
                        </div>
                        <div class="min-w-0">
                            <h3 class="text-sm font-bold text-white tracking-wide truncate max-w-[200px]">${filename}</h3>
                            <p class="text-[10px] text-dim uppercase tracking-widest font-bold mt-0.5">
                                Ref: #${(report.id || '').substring(0,8)} • ${typeConfig.label}
                            </p>
                        </div>
                    </div>

                    <div class="flex-1 grid grid-cols-3 gap-6 text-center lg:text-left">
                        <div>
                            <p class="text-[9px] text-slate-500 uppercase font-bold tracking-widest mb-1">Date</p>
                            <p class="text-[11px] text-slate-200 font-bold">${formattedDate}</p>
                            <p class="text-[9px] text-slate-500">${formattedTime}</p>
                        </div>
                        <div>
                            <p class="text-[9px] text-slate-500 uppercase font-bold tracking-widest mb-1">Score</p>
                            <p class="text-lg font-black ${typeConfig.scoreColor}">${typeConfig.score}<span class="text-[10px]">%</span></p>
                        </div>
                        <div class="flex items-center justify-center">
                            <span class="status-badge ${typeConfig.statusClass}">${typeConfig.statusText}</span>
                        </div>
                    </div>

                    <div class="flex items-center space-x-2">
                        <button class="btn-primary w-11 h-11 text-[10px]" onclick="viewReport('${report.id}')" title="View Report">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="btn-outline w-11 h-11 text-[10px] border-cyan-500/20 text-cyan-400 hover:bg-cyan-600 hover:text-white" onclick="exportReport('${report.id}')" title="Export JSON">
                            <i class="fas fa-download"></i>
                        </button>
                        <button class="btn-outline w-11 h-11 text-[10px] border-rose-500/20 text-rose-500 hover:bg-rose-500 hover:text-white" onclick="deleteReport('${report.id}')" title="Delete">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
                `;
            }).join('');
        }

        function getTypeConfig(report) {
            const type = report.type || 'unknown';
            const cfg = {
                icon: 'fa-file',
                label: 'UNKNOWN',
                bg: 'bg-slate-800',
                iconColor: 'text-slate-400',
                border: 'border-slate-700',
                scoreColor: 'text-slate-400',
                score: '--',
                statusClass: 'status-uncertain',
                statusText: 'Unknown'
            };

            if (type === 'pipeline') {
                const score = Math.round((report.full_data || {}).overall_deception_score || report.overall_deception_score || 0);
                cfg.icon = 'fa-video';
                cfg.label = 'VIDEO SESSION';
                cfg.bg = 'bg-purple-500/10';
                cfg.iconColor = 'text-purple-400';
                cfg.border = 'border-purple-500/20';
                cfg.score = score;
                cfg.scoreColor = score > 60 ? 'text-rose-500' : (score < 30 ? 'text-emerald-500' : 'text-amber-500');
                cfg.statusClass = score > 60 ? 'status-deceptive' : (score < 30 ? 'status-credible' : 'status-uncertain');
                cfg.statusText = score > 60 ? 'DECEPTIVE' : (score < 30 ? 'CREDIBLE' : 'UNCERTAIN');
            } else if (type === 'voice') {
                const score = Math.round((report.metrics || {}).pitch_stability || 50);
                cfg.icon = 'fa-microphone-alt';
                cfg.label = 'VOICE ANALYSIS';
                cfg.bg = 'bg-cyan-500/10';
                cfg.iconColor = 'text-cyan-400';
                cfg.border = 'border-cyan-500/20';
                cfg.score = score;
                cfg.scoreColor = score > 70 ? 'text-emerald-500' : (score < 40 ? 'text-rose-500' : 'text-amber-500');
                cfg.statusClass = score > 70 ? 'status-credible' : (score < 40 ? 'status-deceptive' : 'status-uncertain');
                cfg.statusText = score > 70 ? 'STABLE' : (score < 40 ? 'VOLATILE' : 'MODERATE');
            } else if (type === 'facial' || type === 'emotion') {
                const score = Math.round((report.emotion || {}).confidence * 100 || 60);
                cfg.icon = 'fa-face-smile';
                cfg.label = 'FACIAL ANALYSIS';
                cfg.bg = 'bg-amber-500/10';
                cfg.iconColor = 'text-amber-400';
                cfg.border = 'border-amber-500/20';
                cfg.score = score;
                cfg.scoreColor = score > 70 ? 'text-emerald-500' : 'text-amber-500';
                cfg.statusClass = score > 70 ? 'status-credible' : 'status-uncertain';
                cfg.statusText = (report.emotion || {}).dominant_emotion || 'ANALYSED';
            }

            return cfg;
        }

        function viewReport(id) {
            window.location.href = `report-detail.html?id=${id}`;
        }

        async function exportReport(id) {
            const report = allReports.find(r => r.id === id);
            if (!report) return;
            try {
                const blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `deceptron_report_${id.substring(0,8)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast("Report exported as JSON", "success");
            } catch (e) {
                console.error(e);
                showToast("Export failed", "error");
            }
        }

        async function deleteReport(id) {
            if (!confirm("Delete this report permanently?")) return;
            try {
                const response = await eel.delete_report(id)();
                if (response.success) {
                    loadReports();
                    showToast("Report deleted", "info");
                }
            } catch (error) {
                console.error("Error deleting report:", error);
            }
        }

        function showToast(message, type = 'info') {
            const existing = document.querySelector('.custom-toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'custom-toast fixed top-6 right-6 z-[9999] px-6 py-3 rounded-xl text-xs font-bold uppercase tracking-widest shadow-2xl transition-all duration-500';
            const colors = { success: 'bg-emerald-600 text-white', error: 'bg-rose-600 text-white', info: 'bg-cyan-600 text-white' };
            toast.className += ' ' + (colors[type] || colors.info);
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 3000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            try { initSidebar(); } catch(e) {}
            loadReports();
        });
    </script>
</body>
</html>
